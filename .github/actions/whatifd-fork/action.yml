name: whatifd fork
description: |
  Run a whatifd experiment and surface the verdict as a PR comment + status
  annotation. Thin wrapper over `whatifd fork --config <path>` per Phase I of
  the v0.2 roadmap. The CLI is already CI-ready; this Action saves the
  boilerplate of capturing the report files and posting the comment.

inputs:
  config:
    description: Path to the whatifd config file (.yaml/.yml/.json).
    required: false
    default: whatifd.config.yaml
  profile:
    description: |
      Reporting profile override. Must match the config's reporting.profile.
      `forensic` requires the forensic_acknowledgment block per cardinal #7.
    required: false
    default: ""
  comment-on-pr:
    description: |
      Post the rendered Markdown verdict as a PR comment. Defaults to true on
      pull_request events; ignored otherwise.
    required: false
    default: "true"
  github-token:
    description: |
      GitHub token used to post the PR comment. Defaults to the workflow's
      automatic GITHUB_TOKEN; supply a PAT if the comment must be authored
      by a specific account.
    required: false
    default: ${{ github.token }}
  fail-on-dont-ship:
    description: |
      If 'true' (default), the Action fails the workflow when whatifd's
      verdict is Don't Ship (exit 1) or Inconclusive / setup failure (exit
      2). If 'false', the Action always succeeds and exposes the verdict
      via the `verdict` output for downstream steps to inspect.
    required: false
    default: "true"

outputs:
  verdict:
    description: |
      The whatifd verdict: 'ship', 'dont_ship', or 'inconclusive'. Mirrors the
      CLI exit code (0/1/2) for downstream steps that branch on the result.
    value: ${{ steps.fork.outputs.verdict }}
  exit-code:
    description: Raw exit code from `whatifd fork` (0, 1, or 2).
    value: ${{ steps.fork.outputs.exit_code }}
  report-json:
    description: Path to the emitted ReportV01 JSON file (relative to repo root).
    value: ${{ steps.fork.outputs.report_json }}
  report-md:
    description: Path to the emitted Markdown verdict file (relative to repo root).
    value: ${{ steps.fork.outputs.report_md }}

runs:
  using: composite
  steps:
    # Phase I keeps the wrapper thin: the heavy lifting (config validation,
    # adapter wiring, replay, scoring, decision) is the CLI's job. The
    # Action's job is to capture the artifacts and surface the verdict
    # through the GitHub PR/status surface.
    - name: Run whatifd fork
      id: fork
      shell: bash
      env:
        WHATIFD_CONFIG: ${{ inputs.config }}
        WHATIFD_PROFILE: ${{ inputs.profile }}
      run: |
        set +e

        cmd=(whatifd fork --config "$WHATIFD_CONFIG")
        if [[ -n "$WHATIFD_PROFILE" ]]; then
          cmd+=(--profile "$WHATIFD_PROFILE")
        fi

        echo "::group::whatifd fork"
        "${cmd[@]}"
        exit_code=$?
        echo "::endgroup::"

        # Map CLI exit code → verdict string. 0=ship, 1=dont_ship,
        # 2=inconclusive (covers setup failures and floor-blocked
        # Inconclusives — both are "not Ship and not a clean reject").
        case "$exit_code" in
          0) verdict="ship" ;;
          1) verdict="dont_ship" ;;
          *) verdict="inconclusive" ;;
        esac

        # Locate the latest report files. The CLI writes to ./reports/
        # by convention (see whatifd.cli._run_fork_pipeline).
        #
        # Uses Python for portability: GNU find's printf-format
        # extension is not available on macOS (BSD find), and
        # `stat`'s format spec also diverges between GNU and BSD.
        # Every GitHub runner ships with Python 3, so a one-liner
        # is the cross-platform way to get an mtime-sorted newest
        # match. Issue #93 tracks the cleaner CLI-emits-its-own-
        # paths follow-up; this discovery is the v0.2 fallback.
        # Error swallowing here is INTENTIONAL: a missing reports/
        # directory or empty glob is a legitimate "no artifact"
        # outcome (the CLI exited before writing — typical of
        # setup-failure paths). The downstream PR-comment guard
        # checks `report_md != ''` and skips the comment if so;
        # the fail-on-dont-ship step still fires off the
        # exit_code so the operator sees the actual CLI failure
        # via the workflow's annotation.
        #
        # The narrow case this masks: a permission error on
        # ./reports/ that's distinct from "doesn't exist." On a
        # GitHub-hosted runner that's effectively unreachable
        # (the runner owns its workspace); on self-hosted runners
        # with constrained file ACLs it's a real but rare scenario.
        # If a consumer reports it, the right fix is to migrate to
        # the CLI-emits-paths pattern (issue #93) rather than
        # plumbing a third error class through this discovery.
        report_json=""
        report_md=""
        if [[ -d reports ]]; then
          report_json=$(python3 -c "import glob,os,sys; m=glob.glob('reports/*.json'); m and sys.stdout.write(max(m, key=os.path.getmtime))" 2>/dev/null || true)
          report_md=$(python3 -c "import glob,os,sys; m=glob.glob('reports/*.md'); m and sys.stdout.write(max(m, key=os.path.getmtime))" 2>/dev/null || true)
        fi

        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        echo "report_json=$report_json" >> "$GITHUB_OUTPUT"
        echo "report_md=$report_md" >> "$GITHUB_OUTPUT"

        # Status annotation. The line shows up in the GitHub
        # Actions UI as a notice/warning/error depending on the
        # verdict. Cardinal #1: structured signal, not a stack
        # trace.
        # Annotation level mirrors the fail-step's blocking behavior:
        # Ship => notice (informational), Don't Ship + Inconclusive
        # both block the workflow under fail-on-dont-ship=true, so
        # both surface as ::error for visual consistency. A floor-
        # failure Inconclusive blocks Ship just as firmly as a
        # Don't-Ship verdict; softening one of them to ::warning
        # would mislead a reviewer scanning the Actions UI.
        case "$verdict" in
          ship) echo "::notice title=whatifd verdict::Ship" ;;
          dont_ship) echo "::error title=whatifd verdict::Don't Ship" ;;
          inconclusive) echo "::error title=whatifd verdict::Inconclusive" ;;
        esac

    # Post the rendered Markdown verdict as a PR comment when running on a
    # pull_request event. `gh pr comment` requires GH_TOKEN; the Action
    # accepts an explicit token input so callers can override the default
    # (e.g., to author the comment from a bot account).
    - name: Post PR comment
      if: |
        inputs.comment-on-pr == 'true'
        && github.event_name == 'pull_request'
        && steps.fork.outputs.report_md != ''
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        REPORT_MD: ${{ steps.fork.outputs.report_md }}
        VERDICT: ${{ steps.fork.outputs.verdict }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        # Use $RUNNER_TEMP (per-job temp dir) instead of a hardcoded
        # /tmp path — concurrent matrix jobs on the same runner
        # share /tmp and would collide on a fixed filename. Fall
        # back to `mktemp` if RUNNER_TEMP is unset (e.g., a self-
        # hosted runner that doesn't export it).
        comment_file="${RUNNER_TEMP:-$(mktemp -d)}/whatifd-pr-comment-${GITHUB_RUN_ID:-$$}-${GITHUB_RUN_ATTEMPT:-1}.md"

        # Prepend a verdict header so PR-list scanners see the
        # outcome without expanding the comment.
        {
          case "$VERDICT" in
            ship) echo "## ✅ whatifd: Ship" ;;
            dont_ship) echo "## ❌ whatifd: Don't Ship" ;;
            inconclusive) echo "## ⚠️ whatifd: Inconclusive" ;;
          esac
          echo ""
          cat "$REPORT_MD"
        } > "$comment_file"

        # `--edit-last` updates the PR's most recent comment authored
        # by this token instead of appending a new one. Repeated
        # pushes to the same PR end up with one rolling whatifd
        # comment, not a stack.
        #
        # Failure handling: capture stderr to distinguish "no prior
        # comment to edit" (the legitimate first-run case → fall
        # back to a fresh create) from any other failure (403 on
        # the edit, network, malformed body — surface non-zero so
        # the workflow fails loudly). A blanket `|| gh pr comment
        # ...` would silently create a duplicate on a 403, which
        # is exactly the failure-masking class cardinal #1
        # prohibits.
        #
        # KNOWN LIMITATION: the "no prior comment" detection greps
        # `gh`'s stderr for known phrases. Locale changes
        # (non-English LANG) or future gh CLI version changes that
        # rephrase the error message can break the discrimination —
        # falling through the `elif` to the else-branch surfaces
        # the failure as a real error (correctly), but treats a
        # legitimate first-run as a real error too. Issue #94 (TODO:
        # file) tracks the marker-based replacement: post our
        # comments with an HTML marker (`<!-- whatifd-fork -->`),
        # find them via `gh api` instead of relying on `--edit-last`.
        # Tracked as issue #94.
        edit_stderr=$(gh pr comment "$PR_NUMBER" --body-file "$comment_file" --edit-last 2>&1 1>/dev/null) \
          && edit_status=0 \
          || edit_status=$?

        if [[ $edit_status -eq 0 ]]; then
          : # success
        elif echo "$edit_stderr" | grep -qiE "no.*comment|not found|no comments"; then
          # First run on this PR — no prior whatifd comment to edit.
          # Create a fresh one.
          gh pr comment "$PR_NUMBER" --body-file "$comment_file"
        else
          # Real failure (auth, network, validation). Surface
          # everything we know and exit non-zero.
          echo "::error title=whatifd PR comment::edit-last failed (exit $edit_status): $edit_stderr"
          exit "$edit_status"
        fi

    - name: Fail on Don't Ship / Inconclusive
      if: |
        inputs.fail-on-dont-ship == 'true'
        && steps.fork.outputs.exit_code != '0'
      shell: bash
      env:
        EXIT_CODE: ${{ steps.fork.outputs.exit_code }}
      # No second `::error` emit — the fork step already emitted one
      # for dont_ship/inconclusive verdicts, and a duplicate would
      # show up twice in the Actions UI annotation list. The `exit`
      # alone fails the workflow.
      run: exit "$EXIT_CODE"

branding:
  icon: shield
  color: blue
