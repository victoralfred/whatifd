name: whatifd fork
description: |
  Run a whatifd experiment and surface the verdict as a PR comment + status
  annotation. Thin wrapper over `whatifd fork --config <path>`. The CLI is
  already CI-ready; this Action saves the boilerplate of capturing the report
  files and posting the comment.

inputs:
  config:
    description: Path to the whatifd config file (.yaml/.yml/.json).
    required: false
    default: whatifd.config.yaml
  profile:
    description: |
      Reporting profile override. Must match the config's reporting.profile.
      `forensic` requires the forensic_acknowledgment block per cardinal #7.
    required: false
    default: ""
  comment-on-pr:
    description: |
      Post the rendered Markdown verdict as a PR comment. Defaults to true on
      pull_request events; ignored otherwise.
    required: false
    default: "true"
  github-token:
    description: |
      GitHub token used to post the PR comment. Defaults to the workflow's
      automatic GITHUB_TOKEN; supply a PAT if the comment must be authored
      by a specific account.
    required: false
    default: ${{ github.token }}
  fail-on-dont-ship:
    description: |
      If 'true' (default), the Action fails the workflow when whatifd's
      verdict is Don't Ship (exit 1) or Inconclusive / setup failure (exit
      2). If 'false', the Action always succeeds and exposes the verdict
      via the `verdict` output for downstream steps to inspect.
    required: false
    default: "true"

outputs:
  verdict:
    description: |
      The whatifd verdict: 'ship', 'dont_ship', or 'inconclusive'. Mirrors the
      CLI exit code (0/1/2) for downstream steps that branch on the result.
    value: ${{ steps.fork.outputs.verdict }}
  exit-code:
    description: Raw exit code from `whatifd fork` (0, 1, or 2).
    value: ${{ steps.fork.outputs.exit_code }}
  report-json:
    description: Path to the emitted ReportV01 JSON file (relative to repo root).
    value: ${{ steps.fork.outputs.report_json }}
  report-md:
    description: Path to the emitted Markdown verdict file (relative to repo root).
    value: ${{ steps.fork.outputs.report_md }}

runs:
  using: composite
  steps:
    # The heavy lifting (config validation, adapter wiring, replay, scoring,
    # decision) is the CLI's job. The Action captures the artifacts and
    # surfaces the verdict through the GitHub PR/status surface.
    #
    # Path discovery is no longer a fragile glob+mtime scan: `whatifd fork
    # --print-paths` (#93) emits a single JSON object
    # {report_json, report_md, verdict} on stdout, so the Action reads the
    # exact written paths directly. On a setup failure the CLI exits before
    # writing a report and emits no JSON — report_json/report_md stay empty,
    # which the comment step's guard handles.
    - name: Run whatifd fork
      id: fork
      shell: bash
      env:
        WHATIFD_CONFIG: ${{ inputs.config }}
        WHATIFD_PROFILE: ${{ inputs.profile }}
      run: |
        set +e

        cmd=(whatifd fork --config "$WHATIFD_CONFIG" --print-paths)
        if [[ -n "$WHATIFD_PROFILE" ]]; then
          cmd+=(--profile "$WHATIFD_PROFILE")
        fi

        echo "::group::whatifd fork"
        fork_stdout="$("${cmd[@]}")"
        exit_code=$?
        printf '%s\n' "$fork_stdout"
        echo "::endgroup::"

        # Map CLI exit code → verdict string. 0=ship, 1=dont_ship,
        # 2=inconclusive (covers setup failures and floor-blocked
        # Inconclusives — both "not Ship and not a clean reject"). The exit
        # code is authoritative; the --print-paths JSON mirrors it.
        case "$exit_code" in
          0) verdict="ship" ;;
          1) verdict="dont_ship" ;;
          *) verdict="inconclusive" ;;
        esac

        # Parse the --print-paths JSON for the exact report paths. The JSON
        # is the last stdout line beginning with `{`; `jq` (preinstalled on
        # GitHub-hosted runners) reads it. Empty when no JSON was emitted
        # (setup failure — CLI exited before writing a report), which the
        # comment step's guard handles. `// empty` yields "" for absent keys.
        paths_line="$(printf '%s\n' "$fork_stdout" | grep -E '^[[:space:]]*\{' | tail -n 1)"
        report_json=""
        report_md=""
        if [[ -n "$paths_line" ]]; then
          report_json="$(printf '%s' "$paths_line" | jq -r '.report_json // empty')"
          report_md="$(printf '%s' "$paths_line" | jq -r '.report_md // empty')"
        fi

        echo "exit_code=$exit_code" >> "$GITHUB_OUTPUT"
        echo "verdict=$verdict" >> "$GITHUB_OUTPUT"
        echo "report_json=$report_json" >> "$GITHUB_OUTPUT"
        echo "report_md=$report_md" >> "$GITHUB_OUTPUT"

        # Status annotation. Ship => notice; Don't Ship + Inconclusive both
        # block the workflow under fail-on-dont-ship=true, so both surface as
        # ::error. Cardinal #8: point the operator at the rendered Markdown
        # verdict (or the setup-failure runbook when no report exists).
        if [[ -n "$report_md" ]]; then
          report_pointer="see $report_md for full findings + fix suggestions"
        else
          report_pointer="setup failure (CLI exited before writing a report). Re-run with -v / check the workflow log above; common causes: bad config (run \`whatifd config check\`), missing adapter package, missing credentials. See https://github.com/victoralfred/whatifd/blob/main/CONTRIBUTING.md for the setup-failure runbook."
        fi
        case "$verdict" in
          ship)
            echo "::notice title=whatifd verdict::Ship — $report_pointer"
            ;;
          dont_ship)
            echo "::error title=whatifd verdict::Don't Ship — $report_pointer"
            ;;
          inconclusive)
            echo "::error title=whatifd verdict::Inconclusive — $report_pointer"
            ;;
        esac

    # Post the rendered Markdown verdict as a PR comment when running on a
    # pull_request event. Marker-based dedup (#94): the comment carries a
    # hidden HTML marker; we find a prior whatifd comment by that marker via
    # the API and PATCH it, else create a fresh one. This replaces the old
    # `gh pr comment --edit-last` + locale-fragile stderr-grep heuristic —
    # the marker is exact and locale-independent, and generalizes to GitLab
    # MR notes later.
    - name: Post PR comment
      if: ${{ inputs.comment-on-pr == 'true' && github.event_name == 'pull_request' && steps.fork.outputs.report_md != '' }}
      shell: bash
      env:
        GH_TOKEN: ${{ inputs.github-token }}
        GH_REPO: ${{ github.repository }}
        REPORT_MD: ${{ steps.fork.outputs.report_md }}
        VERDICT: ${{ steps.fork.outputs.verdict }}
        PR_NUMBER: ${{ github.event.pull_request.number }}
      run: |
        set -euo pipefail

        # Hidden marker identifying this Action's comment. Exact-match search
        # via the API — no reliance on `gh`'s human-readable stderr (which is
        # locale-translatable). Bump the marker only with a migration plan.
        MARKER="<!-- whatifd-fork -->"

        # Use $RUNNER_TEMP (per-job temp dir) so concurrent matrix jobs don't
        # collide on a fixed filename; fall back to mktemp on self-hosted
        # runners that don't export it.
        comment_file="${RUNNER_TEMP:-$(mktemp -d)}/whatifd-pr-comment-${GITHUB_RUN_ID:-$$}-${GITHUB_RUN_ATTEMPT:-1}.md"

        {
          echo "$MARKER"
          case "$VERDICT" in
            ship) echo "## ✅ whatifd: Ship" ;;
            dont_ship) echo "## ❌ whatifd: Don't Ship" ;;
            inconclusive) echo "## ⚠️ whatifd: Inconclusive" ;;
          esac
          echo ""
          cat "$REPORT_MD"
        } > "$comment_file"

        # Find an existing whatifd comment by the marker. `--paginate` walks
        # all pages; the jq selects comments whose body contains the marker
        # and takes the last one's id (empty if none). gh-api failures
        # propagate (set -e) — a real auth/network error fails the step
        # loudly rather than silently creating a duplicate (cardinal #1).
        existing_id="$(gh api --paginate \
          "repos/${GH_REPO}/issues/${PR_NUMBER}/comments" \
          --jq "map(select(.body | contains(\"${MARKER}\"))) | last | .id // empty")"

        if [[ -n "$existing_id" ]]; then
          # Edit the existing comment in place — one rolling whatifd comment
          # per PR, not a stack.
          gh api --method PATCH \
            "repos/${GH_REPO}/issues/comments/${existing_id}" \
            -F body=@"$comment_file" >/dev/null
          echo "whatifd: updated PR comment ${existing_id}"
        else
          gh pr comment "$PR_NUMBER" --body-file "$comment_file"
        fi

    - name: Fail on Don't Ship / Inconclusive
      if: ${{ inputs.fail-on-dont-ship == 'true' && steps.fork.outputs.exit_code != '0' }}
      shell: bash
      env:
        EXIT_CODE: ${{ steps.fork.outputs.exit_code }}
      # GitHub Actions outputs are always strings; bash's `exit` coerces a
      # numeric-string argument to its integer form. The CLI's contract is
      # "exit code is one of '0'/'1'/'2'" so EXIT_CODE is always one of those.
      # We deliberately do NOT use arithmetic coercion (`exit $((EXIT_CODE+0))`)
      # — that silently maps a non-numeric token to 0, masking a real bug.
      # No second ::error emit — the fork step already emitted one.
      run: exit "$EXIT_CODE"

branding:
  icon: shield
  color: blue
