version: 2
updates:
  # Python dependencies declared in pyproject.toml.
  - package-ecosystem: pip
    directory: "/"
    schedule:
      interval: weekly
      day: monday
      time: "06:00"
      timezone: Etc/UTC
    open-pull-requests-limit: 5
    labels:
      - dependencies
      - python
    commit-message:
      prefix: chore
      include: scope
    groups:
      # Group dev tooling so we don't get 6 separate PRs each week.
      dev-tooling:
        patterns:
          - ruff
          - mypy
          - pytest*
          - hypothesis
      # Group SDK clients similarly.
      sdks:
        patterns:
          - anthropic
          - langfuse
          - inspect-ai

  # GitHub Actions versions used by the workflows in .github/workflows/.
  - package-ecosystem: github-actions
    directory: "/"
    schedule:
      interval: weekly
      day: monday
    open-pull-requests-limit: 3
    labels:
      - dependencies
      - ci
    commit-message:
      prefix: chore
      include: scope
