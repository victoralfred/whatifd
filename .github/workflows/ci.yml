name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev --group workspace
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      # Phase-tracking sentinel: cascade-catalog
      # "Monorepo workspace + whatifd-langfuse distribution (Phase 4B.1)"
      # mandates the `# TODO(4B.2): drop this comment when
      # whatifd_inspect_ai is workspace-registered.` marker in
      # `tests/unit/whatifd/adapters/test_protocols.py` be removed
      # in the SAME PR that registers `whatifd_inspect_ai`. This
      # step is the machine-checkable gate: when 4B.2 lands, the
      # marker is gone and CI passes; if a future contributor adds
      # a new `TODO(4B.X)` marker for the next sub-phase, the
      # mandate is to remove it at sub-phase merge time too. The
      # grep ignores its own occurrence here (anchored on `# TODO`
      # + paren).
      # Missing-trailing-`d` typo sentinel: the PyPI distribution and
      # CLI are both `whatifd`. A doc snippet like `pip install whatif
      # <other-pkg>` (missing the trailing `d`) would silently install
      # a different package from PyPI — `whatif` is a different
      # project. This sentinel catches `pip install whatif` followed
      # by whitespace or end-of-line; the `[^d]|$` excludes the
      # legitimate `whatifd` form. Markdown only — Python code uses
      # imports, not pip-install shell snippets.
      - name: pip-install missing-d sentinel
        run: |
          # `set +e` because `grep` exits 1 on no-match and the
          # default workflow shell is `bash -e`, which would abort
          # the step on a clean repo. We want grep's no-match to be
          # the SUCCESS path, so we capture stdout and check the
          # variable manually.
          set +e
          # `whatif([^d]|$)` instead of `whatif[^d]` so the regex
          # also catches `pip install whatif` at end-of-line — the
          # `[^d]` form requires a follow-up char, which a trailing
          # newline doesn't satisfy. End-of-line `$` closes that gap.
          # `--` after the regex terminates option parsing so a future
          # path starting with `-` (e.g., a file named `-old.md` at the
          # root of a checkout) doesn't get misparsed as a flag.
          MATCHES=$(grep -rEn 'pip install whatif([^d]|$)' --include='*.md' -- .)
          if [ -n "$MATCHES" ]; then
            echo "Found 'pip install whatif' (without trailing 'd') — must be 'pip install whatifd':"
            echo "$MATCHES"
            exit 1
          fi
          echo "No pip-install typos found."

      # Workspace version-parity gate: the three packages
      # (whatifd, whatifd-langfuse, whatifd-inspect-ai) release
      # together on a single `v*.*.*` tag push (see release.yml). A
      # bump that touches one pyproject.toml but forgets the others
      # would ship three distributions that disagree about which
      # release they belong to — and PyPI version slots can't be
      # republished, so the wrong-version distribution would be
      # wrong forever. This step is structural (greps the three
      # pyproject.toml files directly) so the gate runs even before
      # `uv sync` would let the pytest-level parity test execute.
      # Parse [project].version with tomllib (Python 3.11+ stdlib)
      # rather than grep+sed: a future pyproject.toml that gains a
      # second `version = ` line under a different table (e.g.,
      # a tool config or a dependency pin) would silently confuse
      # a regex-based extractor. The TOML parser is unambiguous.
      # `uv run python` (not bare `python`) so the interpreter is the
      # uv-managed one set up by `astral-sh/setup-uv@v7` above —
      # consistent with every other Python invocation in this workflow
      # and immune to any future change in the runner's default Python.
      - name: Workspace version-parity sentinel
        run: |
          uv run python - <<'EOF'
          import sys
          import tomllib
          from pathlib import Path

          paths = {
              "whatifd": Path("pyproject.toml"),
              "whatifd-langfuse": Path("packages/whatifd-langfuse/pyproject.toml"),
              "whatifd-inspect-ai": Path("packages/whatifd-inspect-ai/pyproject.toml"),
          }
          versions = {}
          for name, path in paths.items():
              with path.open("rb") as fh:
                  data = tomllib.load(fh)
              versions[name] = data["project"]["version"]
              print(f"{name:20s} {versions[name]}")

          distinct = set(versions.values())
          if len(distinct) != 1:
              print(
                  "ERROR: workspace packages disagree on version. "
                  "All three pyproject.toml [project].version fields must "
                  "be bumped in lockstep — see RELEASING.md.",
                  file=sys.stderr,
              )
              sys.exit(1)
          print(f"Workspace version parity: OK ({distinct.pop()}).")
          EOF

      - name: Phase-marker sentinel (TODO(4B.2))
        run: |
          set +e
          # Match the marker form, exclude the workflow file itself.
          MATCHES=$(grep -rEn '# TODO\(4B\.2\)' --include='*.py' --include='*.md' .)
          if [ -n "$MATCHES" ]; then
            echo "Found TODO(4B.2) markers — Phase 4B.2 PR must remove them:"
            echo "$MATCHES"
            exit 0
          fi
          # No markers — Phase 4B.2 hasn't merged yet OR the marker
          # was removed correctly. Both are valid; the step is
          # informational, not gating, until 4B.2 actually lands.
          echo "No TODO(4B.2) markers found."

  type:
    name: type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev --group workspace
      - name: Mypy
        run: uv run mypy src

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev --group workspace
      - name: Pytest
        run: uv run pytest --cov=whatifd --cov-report=term-missing --cov-report=xml -v
      - name: Upload coverage (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn

  # Phase J — Determinism widening (cardinal #4): the deterministic
  # subset must be byte-stable across runner OSes, not just across
  # re-runs on the same OS. This job runs the determinism extractor
  # on Ubuntu and macOS, uploads the canonical-JSON output as an
  # artifact per OS, and a finalizer job downloads both and asserts
  # byte-equality.
  determinism-cross-platform-emit:
    name: determinism cross-platform (emit ${{ matrix.os }})
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest]
    runs-on: ${{ matrix.os }}
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev --group workspace
      - name: Emit deterministic-subset bytes
        run: uv run python tests/integration/_emit_determinism_artifact.py
      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: determinism-subset-${{ matrix.os }}
          path: determinism-subset.json
          if-no-files-found: error

  determinism-cross-platform-compare:
    name: determinism cross-platform (compare)
    needs: determinism-cross-platform-emit
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/download-artifact@v7
        with:
          name: determinism-subset-ubuntu-latest
          path: ubuntu/
      - uses: actions/download-artifact@v7
        with:
          name: determinism-subset-macos-latest
          path: macos/
      - name: Byte-equality assertion
        run: |
          if ! diff -q ubuntu/determinism-subset.json macos/determinism-subset.json; then
            echo "::error title=cross-platform determinism::deterministic-subset bytes differ across Ubuntu and macOS"
            diff ubuntu/determinism-subset.json macos/determinism-subset.json || true
            exit 1
          fi
          echo "::notice title=cross-platform determinism::deterministic-subset bytes are identical across Ubuntu and macOS"
