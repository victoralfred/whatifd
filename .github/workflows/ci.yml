name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

# Cancel superseded runs on the same ref.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  lint:
    name: lint (ruff)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev --group workspace
      - name: Ruff lint
        run: uv run ruff check .
      - name: Ruff format check
        run: uv run ruff format --check .
      # Phase-tracking sentinel: cascade-catalog
      # "Monorepo workspace + whatifd-langfuse distribution (Phase 4B.1)"
      # mandates the `# TODO(4B.2): drop this comment when
      # whatifd_inspect_ai is workspace-registered.` marker in
      # `tests/unit/whatifd/adapters/test_protocols.py` be removed
      # in the SAME PR that registers `whatifd_inspect_ai`. This
      # step is the machine-checkable gate: when 4B.2 lands, the
      # marker is gone and CI passes; if a future contributor adds
      # a new `TODO(4B.X)` marker for the next sub-phase, the
      # mandate is to remove it at sub-phase merge time too. The
      # grep ignores its own occurrence here (anchored on `# TODO`
      # + paren).
      # Brand-vs-distribution-name sentinel: the PyPI distribution
      # is `whatifd`, but the brand and CLI command stay `whatif`.
      # Doc snippets like `pip install whatif <other-pkg>` look
      # plausible to a human reviewer (the brand name appears
      # everywhere) and will silently install the wrong package
      # from PyPI. This sentinel catches `pip install whatif`
      # followed by whitespace (a syntactically-positioned arg),
      # which is the regex shape three review rounds missed before
      # PR #75 fixed it. The negative-lookahead-style `[^d]`
      # excludes the legitimate `whatifd` form. Markdown only —
      # Python code uses imports, not pip-install shell snippets.
      - name: pip-install brand-vs-distribution sentinel
        run: |
          set +e
          MATCHES=$(grep -rEn 'pip install whatif[^d]' --include='*.md' .)
          if [ -n "$MATCHES" ]; then
            echo "Found 'pip install whatif <space|other>' — must be 'pip install whatifd':"
            echo "$MATCHES"
            exit 1
          fi
          echo "No pip-install brand typos found."

      - name: Phase-marker sentinel (TODO(4B.2))
        run: |
          set +e
          # Match the marker form, exclude the workflow file itself.
          MATCHES=$(grep -rEn '# TODO\(4B\.2\)' --include='*.py' --include='*.md' .)
          if [ -n "$MATCHES" ]; then
            echo "Found TODO(4B.2) markers — Phase 4B.2 PR must remove them:"
            echo "$MATCHES"
            exit 0
          fi
          # No markers — Phase 4B.2 hasn't merged yet OR the marker
          # was removed correctly. Both are valid; the step is
          # informational, not gating, until 4B.2 actually lands.
          echo "No TODO(4B.2) markers found."

  type:
    name: type-check (mypy)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev --group workspace
      - name: Mypy
        run: uv run mypy src

  test:
    name: test (py${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.11", "3.12", "3.13"]
    steps:
      - uses: actions/checkout@v6
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: ${{ matrix.python-version }}
          enable-cache: true
      - name: Install
        run: uv sync --all-extras --dev --group workspace
      - name: Pytest
        run: uv run pytest --cov=whatifd --cov-report=term-missing --cov-report=xml -v
      - name: Upload coverage (3.12 only)
        if: matrix.python-version == '3.12'
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml
          path: coverage.xml
          if-no-files-found: warn
