name: release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: read

jobs:
  build:
    name: build distributions
    runs-on: ubuntu-latest
    outputs:
      ref-name: ${{ github.ref_name }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      # Tag↔version parity guard. The `version` field in each
      # pyproject.toml is what PyPI actually publishes; the git tag
      # is decorative metadata. A mismatch silently publishes the
      # wrong version, burning the slot forever (PyPI rejects
      # republishing). Surfaced during the v0.2.0rc1 TestPyPI dry-run
      # where the tag was `v0.2.0rc1` but pyproject still declared
      # `0.2.0` — the dry-run published `0.2.0` to TestPyPI, not the
      # intended rc1. This step fails the build before any artifact
      # is produced if the tag (minus leading `v`) doesn't match the
      # declared version in every workspace pyproject.
      - name: Verify tag matches package versions
        # Uses stdlib `tomllib` (Python 3.11+, present on `ubuntu-latest`)
        # rather than `grep ^version =` so a future pyproject layout
        # (a `[tool.X] version = ...` subsection, a multi-line array
        # whose first line happens to begin with `version =`, etc.)
        # can't false-positive. Runs before setup-uv so we depend on
        # the runner's system python3 here, not on uv being installed.
        run: |
          python3 <<'PY'
          import os
          import sys
          import tomllib
          from pathlib import Path

          tag = os.environ["GITHUB_REF_NAME"]
          tag_version = tag.removeprefix("v")
          packages = [
              "pyproject.toml",
              "packages/whatifd-langfuse/pyproject.toml",
              "packages/whatifd-inspect-ai/pyproject.toml",
              "packages/whatifd-phoenix/pyproject.toml",
          ]
          bad = 0
          for pkg in packages:
              path = Path(pkg)
              if not path.exists():
                  print(
                      f"::error file={pkg}::pyproject.toml is missing — the "
                      f"workspace package set in release.yml drifted from the "
                      f"actual repo layout. Update the `packages` list."
                  )
                  bad += 1
                  continue
              try:
                  data = tomllib.loads(path.read_text())
              except tomllib.TOMLDecodeError as exc:
                  print(f"::error file={pkg}::malformed TOML: {exc}")
                  bad += 1
                  continue
              try:
                  pkg_version = data["project"]["version"]
              except KeyError:
                  print(
                      f"::error file={pkg}::missing [project].version — "
                      f"the file parses but has no version field."
                  )
                  bad += 1
                  continue
              if pkg_version != tag_version:
                  print(
                      f"::error file={pkg}::tag {tag} implies version "
                      f"{tag_version} but [project].version declares {pkg_version}"
                  )
                  bad += 1
          if bad:
              print(
                  f"::error::{bad} pyproject.toml file(s) disagree with tag "
                  f"{tag}. Bump versions in lockstep and re-tag."
              )
              sys.exit(1)
          print(
              f"Tag {tag} matches all four workspace pyproject.toml "
              f"versions ({tag_version})."
          )
          PY
      - uses: astral-sh/setup-uv@v7
        with:
          python-version: "3.12"
          enable-cache: true
      # Pre-publish test gate: a tag push that fails tests would
      # otherwise consume PyPI version slots (republish is rejected
      # forever) before any failure is visible. Running the suite
      # here is the cheap insurance — TestPyPI dry-run is
      # recommended for full path validation, but this catches the
      # fast-feedback class (tests that pass on main but fail on
      # the tagged commit due to a bad rebase / amendment).
      - name: Install dependencies (workspace)
        run: uv sync --all-extras --dev --group workspace
      - name: Run tests
        run: uv run pytest tests/ packages/ -q
      - name: Build root distribution (whatifd)
        run: uv build --out-dir dist-whatifd
      - name: Build whatifd-langfuse distribution
        run: uv build --package whatifd-langfuse --out-dir dist-whatifd-langfuse
      - name: Build whatifd-inspect-ai distribution
        run: uv build --package whatifd-inspect-ai --out-dir dist-whatifd-inspect-ai
      - name: Build whatifd-phoenix distribution
        run: uv build --package whatifd-phoenix --out-dir dist-whatifd-phoenix
      - name: List artifacts
        run: |
          ls -la dist-whatifd dist-whatifd-langfuse dist-whatifd-inspect-ai dist-whatifd-phoenix
      - uses: actions/upload-artifact@v4
        with:
          name: dist-whatifd
          path: dist-whatifd/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: dist-whatifd-langfuse
          path: dist-whatifd-langfuse/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: dist-whatifd-inspect-ai
          path: dist-whatifd-inspect-ai/
          if-no-files-found: error
      - uses: actions/upload-artifact@v4
        with:
          name: dist-whatifd-phoenix
          path: dist-whatifd-phoenix/
          if-no-files-found: error

  # Each package publishes from its own job because PyPI Trusted
  # Publishing requires a 1:1 mapping between (workflow,
  # environment) and the PyPI project. The `environment.name` MUST
  # match the "Pending Publisher" or active publisher configured on
  # PyPI for that project.
  #
  # PyPI configuration (one-time, per package):
  #   1. Go to https://pypi.org/manage/project/<name>/settings/publishing/
  #   2. Add a Trusted Publisher: owner=victoralfred,
  #      repository=whatifd, workflow=release.yml,
  #      environment=<matching name below>.
  # For an unregistered project, configure under "Pending Publisher"
  # at https://pypi.org/manage/account/publishing/.
  publish-whatifd:
    name: publish whatifd to PyPI
    needs: build
    runs-on: ubuntu-latest
    environment:
      name: pypi-whatifd
      url: https://pypi.org/p/whatifd
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-whatifd
          path: dist/
      # Supply-chain note: this action consumes the OIDC token
      # granted by `id-token: write`. For maximum hardening, pin
      # to a full commit SHA instead of `release/v1` before tagging
      # — see RELEASING.md "Supply-chain hardening" section.
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-whatifd-langfuse:
    name: publish whatifd-langfuse to PyPI
    needs: publish-whatifd
    runs-on: ubuntu-latest
    environment:
      name: pypi-whatifd-langfuse
      url: https://pypi.org/p/whatifd-langfuse
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-whatifd-langfuse
          path: dist/
      # Supply-chain note: this action consumes the OIDC token
      # granted by `id-token: write`. For maximum hardening, pin
      # to a full commit SHA instead of `release/v1` before tagging
      # — see RELEASING.md "Supply-chain hardening" section.
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-whatifd-inspect-ai:
    name: publish whatifd-inspect-ai to PyPI
    needs: publish-whatifd
    runs-on: ubuntu-latest
    environment:
      name: pypi-whatifd-inspect-ai
      url: https://pypi.org/p/whatifd-inspect-ai
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-whatifd-inspect-ai
          path: dist/
      # Supply-chain note: this action consumes the OIDC token
      # granted by `id-token: write`. For maximum hardening, pin
      # to a full commit SHA instead of `release/v1` before tagging
      # — see RELEASING.md "Supply-chain hardening" section.
      - uses: pypa/gh-action-pypi-publish@release/v1

  publish-whatifd-phoenix:
    name: publish whatifd-phoenix to PyPI
    needs: publish-whatifd
    runs-on: ubuntu-latest
    environment:
      name: pypi-whatifd-phoenix
      url: https://pypi.org/p/whatifd-phoenix
    permissions:
      id-token: write
    steps:
      - uses: actions/download-artifact@v4
        with:
          name: dist-whatifd-phoenix
          path: dist/
      - uses: pypa/gh-action-pypi-publish@release/v1

  github-release:
    name: github release with notes
    needs:
      - publish-whatifd
      - publish-whatifd-langfuse
      - publish-whatifd-inspect-ai
      - publish-whatifd-phoenix
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/download-artifact@v4
        with:
          pattern: dist-*
          merge-multiple: true
          path: dist/
      - name: Create GitHub release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${{ github.ref_name }}" \
            dist/* \
            --title "${{ github.ref_name }}" \
            --generate-notes
