name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC. Catches new CVEs that landed since last push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install pip-audit
        run: python -m pip install --upgrade pip pip-audit
      - name: Audit pyproject (all extras)
        # `--strict` fails the job on any vuln, including dev/test deps.
        # If you want to permit dev-only vulns, drop --strict and parse output.
        run: pip-audit --disable-pip --strict

  bandit:
    name: bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: python -m pip install --upgrade pip "bandit[toml]"
      - name: Run bandit
        # -ll = report medium+ severity; -ii = medium+ confidence.
        run: bandit -r src/ -ll -ii -f txt

  secrets-scan:
    name: gitleaks (secrets in history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
