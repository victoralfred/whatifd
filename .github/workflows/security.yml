name: security

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    # Mondays 06:00 UTC. Catches new CVEs that landed since last push.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  pip-audit:
    name: pip-audit (dependency CVEs)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install project with all extras + pip-audit
        run: |
          python -m pip install --upgrade pip pip-audit
          python -m pip install ".[langfuse,inspect,anthropic,dev]"
      - name: Audit installed environment (excluding the project itself)
        # whatifd is pre-release (not on PyPI); strip it from the audit list.
        # pip 25+ outputs local non-editable installs as `whatifd @ file:///...`
        # rather than `whatifd==0.0.1`, so match both forms via [ =@] after the
        # package name.
        # --strict fails the job on any vuln, including dev/test deps.
        # To permit dev-only vulns, drop --strict and filter the JSON output.
        run: |
          pip freeze --exclude-editable | grep -vE '^whatifd[ =@]' > /tmp/audit-requirements.txt
          pip-audit -r /tmp/audit-requirements.txt --strict

  bandit:
    name: bandit (Python SAST)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - name: Install bandit
        run: python -m pip install --upgrade pip "bandit[toml]"
      - name: Run bandit
        # -ll = report medium+ severity; -ii = medium+ confidence.
        run: bandit -r src/ -ll -ii -f txt

  secrets-scan:
    name: gitleaks (secrets in history)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0
      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ github.token }}
