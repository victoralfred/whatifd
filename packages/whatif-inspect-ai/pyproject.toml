[project]
name = "whatif-inspect-ai"
version = "0.1.0"
description = "Inspect AI `Scorer` adapter for whatif. Phase 4B.2 of the v0.1 plan."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
authors = [
  { name = "victoralfred" },
]
keywords = ["whatif", "inspect-ai", "llm", "scoring", "evaluation"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Testing",
]

# Library-style version pinning per industry practice: lower bound
# matches the minimum Inspect AI release this adapter targets;
# upper cap reserves the next minor for a coordinated migration.
# Inspect AI is pre-1.0 and ships breaking changes within minor
# bumps, so we cap at the next minor (`0.4`) rather than the next
# major.
dependencies = [
  "whatif",
  "inspect-ai>=0.3.216,<0.4",
]

[project.optional-dependencies]
dev = [
  "pytest>=9.0.3",
]

[project.urls]
Homepage = "https://github.com/victoralfred/whatif"
Issues   = "https://github.com/victoralfred/whatif/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/whatif_inspect_ai"]

[tool.uv.sources]
# In-tree workspace; PyPI consumers see only the public dependencies above.
whatif = { workspace = true }

# Self-contained tooling settings (mirrors the root pyproject and
# the sibling `whatif-langfuse` package). Out-of-tree contributors
# get the same discipline.
[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "N", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_return_any = true

# Mirror the root `addopts` so `pytest` from inside this package
# directory (without root config inheritance) still resolves the
# test_conformance.py basename collision the same way the root
# does. Standalone `cd packages/whatif-inspect-ai && pytest` works.
[tool.pytest.ini_options]
addopts = "-ra --strict-markers --import-mode=importlib"
asyncio_mode = "auto"
