[project]
name = "whatifd-datadog"
version = "0.2.1"
description = "Datadog LLM Observability `TraceSource` adapter for whatifd."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
authors = [
  { name = "victoralfred" },
]
keywords = ["whatifd", "datadog", "llm-observability", "llm", "tracing", "evaluation"]
classifiers = [
  "Development Status :: 3 - Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Testing",
]

# Hard runtime deps: only `whatifd`. Mirrors `whatifd-phoenix`: the
# adapter core (`DatadogTraceSource`) is span-iterator-shaped — it takes
# a `spans_provider` callable, so it has no network dependency and is
# fully testable offline. The HTTP client that talks to the Datadog
# LLM Observability Export API (`client.py`) lazily imports `httpx`, so
# `httpx` is a `live` extra rather than a hard dep. R-1 (2026-06-04)
# established that the official `datadog-api-client` SDK does NOT expose
# the spans-read path; a thin httpx client over the documented
# `/api/v2/llm-obs/v1/spans/events[/search]` endpoints is the supported
# read surface.
dependencies = [
  "whatifd",
]

[project.optional-dependencies]
dev = [
  "pytest>=9.0.3",
]
# `live` pulls the HTTP client dependency used by `client.py` to call
# the LLM Observability Export API. Operators running against a real
# Datadog org install `pip install whatifd-datadog[live]`. A future
# follow-up adds a recorded-cassette smoke test (the R-1 residual);
# until then the conformance test exercises the span-iterator surface
# with synthetic span dicts and no network.
live = [
  "httpx>=0.27,<1.0",
]

[project.scripts]
# CI-side verdict-metrics emitter (P1b). Reads a ReportV01 JSON written by
# `whatifd fork` and pushes gauges to Datadog. Out of whatifd core by design.
whatifd-datadog-emit = "whatifd_datadog.emit:main"

[project.urls]
Homepage = "https://github.com/victoralfred/whatifd"
Issues   = "https://github.com/victoralfred/whatifd/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/whatifd_datadog"]

[tool.uv.sources]
whatifd = { workspace = true }

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "N", "RUF"]
ignore = ["E501"]

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_return_any = true
# This adapter reads raw JSON (Export API span dicts as `dict[str, object]`,
# response envelopes via TypedDict + cast) — no typed SDK, so NO explicit
# `Any`. Enforce it: a reintroduced `: Any` (the leak class that hides
# "unknown type" bugs) fails the package's own mypy. `disallow_any_expr` is
# deliberately NOT set (too aggressive for json `.get()`); the discipline is
# "type boundaries with `object`/TypedDict + narrow", not "ban every Any expr".
disallow_any_explicit = true
