[project]
name = "whatif"
version = "0.0.1"
description = "Open experiment runner for LLM behavior changes. Fork production traces, replay with a proposed change, score the diff, emit a PR-ready verdict report."
readme = "README.md"
license = { text = "Apache-2.0" }
requires-python = ">=3.11"
authors = [
  { name = "voseghale" },
]
keywords = ["llm", "evaluation", "observability", "sre", "agents", "regression-testing", "ci"]
classifiers = [
  "Development Status :: 2 - Pre-Alpha",
  "Intended Audience :: Developers",
  "License :: OSI Approved :: Apache Software License",
  "Programming Language :: Python :: 3",
  "Programming Language :: Python :: 3.11",
  "Programming Language :: Python :: 3.12",
  "Topic :: Software Development :: Testing",
  "Topic :: Software Development :: Quality Assurance",
]

dependencies = [
  "pydantic>=2.6",
  "typer>=0.12",
  "httpx>=0.27",
  "anyio>=4.3",
  "pyyaml>=6.0",
  "rich>=13.7",
]

[project.optional-dependencies]
langfuse  = ["langfuse>=2.0"]
inspect   = ["inspect-ai>=0.3"]
anthropic = ["anthropic>=0.40"]
dev = [
  "pytest>=9.0.3",
  "pytest-asyncio>=1.3.0",
  "pytest-cov>=7.1.0",
  "ruff>=0.15.12",
  "mypy>=1.20.2",
  "hypothesis>=6.152.4",
]

[project.scripts]
whatif = "whatif.cli:app"

[project.urls]
Homepage      = "https://github.com/voseghale/whatif"
Documentation = "https://github.com/voseghale/whatif/blob/main/DESIGN.md"
Issues        = "https://github.com/voseghale/whatif/issues"

[build-system]
requires = ["hatchling"]
build-backend = "hatchling.build"

[tool.hatch.build.targets.wheel]
packages = ["src/whatif"]

[tool.ruff]
line-length = 100
target-version = "py311"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP", "SIM", "N", "RUF"]
ignore = ["E501"]  # line length handled by formatter

[tool.mypy]
python_version = "3.11"
strict = true
warn_unused_ignores = true
warn_return_any = true

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-ra --strict-markers"
asyncio_mode = "auto"
